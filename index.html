<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Minas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>
            Delícias de Minas
        </h1>
    </header>

    <main>
        <section>
            <h2>Pão de Queijo</h2>
            <img src="img/pão-de-queijo.jpeg" alt="Pão de Queijo">
            <button popovertarget="Segredo">Ver Segredo do Chef</button>
            <div id="Segredo" popover>
                <p>
                    Jamais coloque os ovos com a massa quente,
                    senão eles cozinham e o pão não cresce!
                </p>
            </div>
        </section>

    </main>


</body>
</html>
